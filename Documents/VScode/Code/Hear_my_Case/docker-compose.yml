services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hear_my_case_postgres
    environment:
      POSTGRES_USER: hear_user
      POSTGRES_PASSWORD: hear_password
      POSTGRES_DB: hear_my_case
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hear_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hear_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hear_my_case_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hear_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hear_my_case_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hear_user:hear_password@postgres:5432/hear_my_case
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      DEBUG: "True"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-xxxxx}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-key-change-in-production}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hear_network

  # React Frontend (Optional for development)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: hear_my_case_frontend
  #   command: npm run dev
  #   ports:
  #     - "3000:5173"
  #   volumes:
  #     - ./frontend:/app
  #   depends_on:
  #     - backend
  #   networks:
  #     - hear_network

volumes:
  postgres_data:
  redis_data:

networks:
  hear_network:
    driver: bridge
